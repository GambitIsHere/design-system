# Domain manifest — Sanjow product portfolio audit
#
# Derived from /Users/srikan/Documents/GitHub/Sanjow/Sanjow-Ventures/* by reading
# package.json + next.config + i18n routing per repo, plus product-portfolio.md.
#
# Where a clean brand and a legacy domain coexist, audit BOTH and report side-by-side.
# The clean-vs-legacy delta is the single most important number for the portfolio
# audit's Option B (new-domain) decision.
#
# Locales follow Sanjow's standard 8-language set (en, fr, es, it, de, pt, nl, pl)
# unless the repo overrides — confirmed per product where known.
#
# UNVERIFIED domains are marked `tentative: true` — confirm before scoring.

products:

  wepdf:
    display_name: "WePDF"
    domains:
      - url: "https://workspace.we-pdf.com"
        role: clean        # NEW clean-brand domain — primary going forward
      - url: "https://we-pdf.com"
        role: legacy       # legacy domain — audited for the clean-vs-legacy delta
    locales: [en, fr, es, pt, it, de, nl, pl, tr, ja]
    default_locale: fr
    repo: "Sanjow-Ventures/pdf/apps/we-pdf"
    stack: "next.js + next-intl + turbo monorepo"
    tier_routes:
      homepage: "/"
      transactional: "/pricing"          # confirm during audit
      seo_landing: "/compress-pdf"       # confirm during audit
      deep_programmatic: "/{locale}/merger-pdf"
    notes: |
      Audit BOTH domains. The clean (workspace.we-pdf.com) vs legacy
      (we-pdf.com) delta is the single most important number for the
      portfolio audit's Option B (new-domain) decision per prompt §Edge cases.

  topup:
